<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 정시 지원 가능 대학 확인</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background-color: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        /* 점수 입력 영역 */
        .input-section { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 20px; padding: 20px; background-color: #ecf0f1; border-radius: 8px; }
        .input-group { display: flex; flex-direction: column; text-align: center; }
        label { font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { padding: 10px; font-size: 16px; border: 1px solid #bbb; border-radius: 5px; width: 140px; box-sizing: border-box; }
        button { padding: 10px 25px; font-size: 16px; font-weight: bold; color: #fff; background-color: #3498db; border: none; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; }
        button:hover { background-color: #2980b9; }
        .total-score-box { text-align: center; font-size: 18px; font-weight: bold; margin-top: 10px; color: #2c3e50; }

        /* 필터 및 검색 영역 */
        .filter-section { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-end; margin-bottom: 20px; padding: 15px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; }
        .filter-group { display: flex; flex-direction: column; text-align: left; }
        .filter-group label { font-size: 12px; margin-bottom: 4px; color: #888; }
        .checkbox-group { display: flex; gap: 10px; align-items: center; padding: 10px 0; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 14px; color: #333; cursor: pointer; }

        /* 테이블 영역 */
        .table-container { max-height: 700px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; background-color: #2c3e50; z-index: 10; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
        th { color: #fff; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .status { font-weight: bold; padding: 5px 10px; border-radius: 15px; display: inline-block; min-width: 60px; }
        .sufficient { background-color: #d5edda; color: #155724; }
        .appropriate { background-color: #fff3cd; color: #856404; }
        .difficult { background-color: #f8d7da; color: #721c24; }

        .result-count { text-align: center; font-weight: bold; margin-bottom: 10px; color: #555; }
        .loading-message { text-align: center; font-size: 18px; color: #e67e22; font-weight: bold; padding: 50px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>2026학년도 정시 지원 가능 대학 확인</h1>

    <!-- 점수 입력 -->
    <div class="input-section">
        <div class="input-group">
            <label for="kor">국어 표점</label>
            <input type="number" id="kor" placeholder="예: 130" oninput="calculateTotal()">
        </div>
        <div class="input-group">
            <label for="math">수학 표점</label>
            <input type="number" id="math" placeholder="예: 132" oninput="calculateTotal()">
        </div>
        <div class="input-group">
            <label for="sub1">탐구1 표점</label>
            <input type="number" id="sub1" placeholder="예: 66" oninput="calculateTotal()">
        </div>
        <div class="input-group">
            <label for="sub2">탐구2 표점</label>
            <input type="number" id="sub2" placeholder="예: 66" oninput="calculateTotal()">
        </div>
        <div class="input-group">
            <label for="category">계열 선택</label>
            <select id="category" onchange="renderResults()">
                <option value="all">전체</option>
                <option value="자연">자연</option>
                <option value="인문">인문</option>
                <option value="통합">통합</option>
            </select>
        </div>
        <button onclick="calculateAndStoreResults()">지원 가능 확인</button>
    </div>

    <div class="total-score-box">
        내 총점 (국+수+탐1+탐2): <span id="totalScore">0</span> 점
    </div>

    <!-- 필터 영역 -->
    <div class="filter-section">
        <div class="filter-group">
            <label for="univSelect">특정 대학만 보기</label>
            <select id="univSelect" onchange="renderResults()">
                <option value="all">전체 대학</option>
            </select>
        </div>
        <div class="filter-group">
            <label for="sortSelect">정렬 기준</label>
            <select id="sortSelect" onchange="renderResults()">
                <option value="name">대학명 가나다순</option>
                <option value="diff">점수 차이순 (가까운 순)</option>
            </select>
        </div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="filterSufficient" checked onchange="renderResults()"> 충분</label>
            <label><input type="checkbox" id="filterAppropriate" checked onchange="renderResults()"> 적절</label>
            <label><input type="checkbox" id="filterDifficult" checked onchange="renderResults()"> 어려움</label>
        </div>
    </div>

    <div class="result-count" id="resultCount">데이터를 불러오는 중입니다...</div>

    <!-- 결과 테이블 -->
    <div class="table-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>대학명</th>
                    <th>학과명</th>
                    <th>계열</th>
                    <th>입결 기준 점수</th>
                    <th>내 점수와의 차이</th>
                    <th>합격 가능성</th>
                </tr>
            </thead>
            <tbody id="resultBody">
                <tr><td colspan="6" class="loading-message">⏳ data.txt 파일을 로드 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let universityData = [];
    let calculatedResults = []; 

    // 스마트 데이터 파싱 로직
    function parseData(rawText) {
        const lines = rawText.trim().split(/\r?\n/);
        const parsed = [];
        let uniIdx = -1, depIdx = -1, catIdx = -1, scoreIdx = -1;
        
        for (let i = 0; i < Math.min(lines.length, 20); i++) {
            const parts = lines[i].split(/\t|\|/).map(p => p.trim());
            if (parts.includes('대학') && parts.includes('학과')) {
                uniIdx = parts.indexOf('대학');
                depIdx = parts.indexOf('학과');
                catIdx = parts.indexOf('계열');
                for (let j = uniIdx - 1; j >= 0; j--) {
                    if (!isNaN(parseFloat(parts[j])) && parseFloat(parts[j]) > 50) {
                        scoreIdx = j;
                        break;
                    }
                }
                break;
            }
        }

        lines.forEach((line) => {
            const parts = line.split(/\t|\|/).map(p => p.trim());
            if (parts.length < 4) return;

            let cutScore, university, department, category;

            if (uniIdx !== -1 && scoreIdx !== -1) {
                if (parts.length <= Math.max(uniIdx, depIdx, catIdx, scoreIdx)) return;
                cutScore = parseFloat(parts[scoreIdx]);
                university = parts[uniIdx];
                department = parts[depIdx];
                category = parts[catIdx] || "통합";
            } else {
                let found = false;
                for (let j = 0; j < parts.length - 2; j++) {
                    const val = parseFloat(parts[j]);
                    if (!isNaN(val) && val > 50 && val < 600) {
                        const u = parts[j+1];
                        const d = parts[j+2];
                        if (u && u !== '*' && isNaN(parseFloat(u)) && d && d !== '*' && isNaN(parseFloat(d))) {
                            cutScore = val;
                            university = u;
                            department = d;
                            category = parts[j+3] || "통합";
                            found = true;
                            break;
                        }
                    }
                }
                if (!found) return;
            }

            if (!isNaN(cutScore) && university && university !== '*' && department && department !== '*') {
                if (typeof cutScore === 'number' && !isNaN(cutScore)) {
                    parsed.push({
                        university: String(university).trim(),
                        department: String(department).trim(),
                        category: String(category).trim(),
                        cutScore: cutScore
                    });
                }
            }
        });
        return parsed;
    }

    // 총점 계산
    function calculateTotal() {
        const kor = parseFloat(document.getElementById('kor').value) || 0;
        const math = parseFloat(document.getElementById('math').value) || 0;
        const sub1 = parseFloat(document.getElementById('sub1').value) || 0;
        const sub2 = parseFloat(document.getElementById('sub2').value) || 0;
        document.getElementById('totalScore').innerText = kor + math + sub1 + sub2;
    }

    // 확인 버튼 클릭 시 점수 계산 후 결과 저장
    function calculateAndStoreResults() {
        const kor = parseFloat(document.getElementById('kor').value) || 0;
        const math = parseFloat(document.getElementById('math').value) || 0;
        const sub1 = parseFloat(document.getElementById('sub1').value) || 0;
        const sub2 = parseFloat(document.getElementById('sub2').value) || 0;
        const myScore = kor + math + sub1 + sub2;

        if (universityData.length === 0) {
            alert('데이터가 아직 로드되지 않았거나 data.txt 파일이 없습니다.');
            return;
        }
        if (myScore === 0) {
            alert('점수를 올바르게 입력해주세요.');
            return;
        }

        calculatedResults = [];
        universityData.forEach(item => {
            const diff = myScore - item.cutScore;
            let status = "", statusClass = "";
            if (diff >= 0) { status = "충분"; statusClass = "sufficient"; } 
            else if (diff >= -5) { status = "적절"; statusClass = "appropriate"; } 
            else { status = "어려움"; statusClass = "difficult"; }
            
            calculatedResults.push({
                university: item.university,
                department: item.department,
                category: item.category,
                cutScore: item.cutScore,
                diff: diff,
                status: status,
                statusClass: statusClass
            });
        });

        updateUniversityDropdown();
        renderResults();
    }

    // 대학 드롭다운 업데이트
    function updateUniversityDropdown() {
        const uniqueUnivs = [...new Set(calculatedResults.map(item => item.university))].sort();
        const select = document.getElementById('univSelect');
        select.innerHTML = '<option value="all">전체 대학</option>';
        uniqueUnivs.forEach(univ => {
            const option = document.createElement('option');
            option.value = univ;
            option.textContent = univ;
            select.appendChild(option);
        });
    }

    // 필터링 및 렌더링
    function renderResults() {
        if (calculatedResults.length === 0) return;

        const selectedCategory = document.getElementById('category').value;
        const selectedUniv = document.getElementById('univSelect').value;
        const sortType = document.getElementById('sortSelect').value;
        
        const showSufficient = document.getElementById('filterSufficient').checked;
        const showAppropriate = document.getElementById('filterAppropriate').checked;
        const showDifficult = document.getElementById('filterDifficult').checked;

        let filtered = calculatedResults.filter(item => {
            const categoryMatch = (selectedCategory === 'all' || item.category === selectedCategory || item.category === '통합');
            const univSelectMatch = (selectedUniv === 'all' || item.university === selectedUniv);
            const statusMatch = (item.status === "충분" && showSufficient) || 
                                (item.status === "적절" && showAppropriate) || 
                                (item.status === "어려움" && showDifficult);

            return categoryMatch && univSelectMatch && statusMatch;
        });

        // 정렬
        if (sortType === 'name') {
            filtered.sort((a, b) => a.university.localeCompare(b.university) || a.department.localeCompare(b.department));
        } else if (sortType === 'diff') {
            filtered.sort((a, b) => Math.abs(a.diff) - Math.abs(b.diff));
        }

        // 결과 출력
        const resultBody = document.getElementById('resultBody');
        const resultCount = document.getElementById('resultCount');
        resultBody.innerHTML = '';
        
        if (filtered.length === 0) {
            resultCount.innerText = "검색 결과가 없습니다.";
            resultBody.innerHTML = '<tr><td colspan="6">조건에 맞는 대학/학과가 없습니다.</td></tr>';
            return;
        }

        resultCount.innerText = `총 ${filtered.length}개의 검색 결과`;

        filtered.forEach(res => {
            const row = document.createElement('tr');
            const diffText = res.diff >= 0 ? `+${res.diff.toFixed(2)}` : res.diff.toFixed(2);
            row.innerHTML = `
                <td>${res.university}</td>
                <td>${res.department}</td>
                <td>${res.category}</td>
                <td>${res.cutScore.toFixed(2)}</td>
                <td style="color: ${res.diff >= 0 ? '#155724' : '#721c24'}; font-weight: bold;">${diffText}</td>
                <td><span class="status ${res.statusClass}">${res.status}</span></td>
            `;
            resultBody.appendChild(row);
        });
    }

    // 페이지 로드 시 data.txt 자동 불러오기
    window.onload = async function() {
        try {
            // 같은 폴더에 있는 data.txt 파일을 읽어옴
            const response = await fetch('data.txt');
            if (!response.ok) {
                throw new Error('File not found');
            }
            const rawText = await response.text();
            
            universityData = parseData(rawText);
            
            if(universityData.length > 0) {
                document.getElementById('resultCount').innerText = `데이터 로드 완료! (총 ${universityData.length}개) 점수를 입력하고 확인 버튼을 눌러주세요.`;
                document.getElementById('resultBody').innerHTML = '<tr><td colspan="6">점수 입력 후 [지원 가능 확인] 버튼을 누르면 결과가 나타납니다.</td></tr>';
            } else {
                throw new Error('No valid data parsed');
            }
        } catch (error) {
            console.error('데이터 로드 실패:', error);
            document.getElementById('resultCount').innerText = "❌ data.txt 파일을 불러오지 못했습니다.";
            document.getElementById('resultBody').innerHTML = '<tr><td colspan="6" style="color:red;">data.txt 파일이 index.html과 같은 폴더에 있는지 확인해주세요.<br>(깃허브 페이지가 활성화되어야 작동합니다.)</td></tr>';
        }
    };
</script>

</body>
</html>
