            { name: "홍익대학교", letter: "홍", tags: ['인문', '수리'], schedules: [{ date: "2026-10-03", time: "미정", type: "수리", detail: "자연계열/캠퍼스자율전공(자연, 예능)" }, { date: "2026-10-04", time: "미정", type: "인문", detail: "인문계열/예술학과/캠퍼스자율전공(인문, 예능)" }], info: { minimum: "2개합 5 (탐구 1개)", mandatory: "국, 수, 영 / 사, 과", history: "4등급", extra: "한문 가산점", trend: "120분 / 논술90+교과10 / 384명 / 2~4개 제시문(1600자 내외) / 범위: 국어,사회(역사,도덕포함) (자연: 수1,2,미적,확통,기하)" } }
        ];

        let selectedUniversities = new Set();
        let currentFilter = 'all';
        let calYear = 2026;
        let calMonth = 9; 

        // 1페이지: 대학 카드 렌더링
        function renderCheckboxes() {
            const container = document.getElementById('university-list');
            container.innerHTML = '';
            
            let visibleCount = 0;
            universitiesData.forEach((uni) => {
                const matchesFilter = currentFilter === 'all' || uni.tags.includes(currentFilter);
                
                if (matchesFilter) {
                    visibleCount++;
                    const isSelected = selectedUniversities.has(uni.name);
                    const card = document.createElement('div');
                    card.className = `uni-card relative bg-white p-4 rounded-2xl border-2 ${isSelected ? 'selected' : 'border-slate-100'} cursor-pointer hover:border-indigo-200`;
                    card.onclick = () => toggleSelection(uni.name);
                    
                    let tagHtml = uni.tags.map(tag => `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${tag === '인문' ? 'bg-blue-50 text-blue-600' : 'bg-green-50 text-green-600'}">${tag}</span>`).join('');
                    
                    card.innerHTML = `
                        <div class="check-icon absolute top-3 right-3 w-5 h-5 bg-indigo-600 rounded-full flex items-center justify-center text-white text-xs">✓</div>
                        <div class="flex items-center gap-3 pr-6">
                            <div class="uni-letter w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg flex-shrink-0">${uni.letter}</div>
                            <div class="min-w-0">
                                <h3 class="text-base font-bold text-slate-800 truncate">${uni.name}</h3>
                                <div class="flex gap-1 mt-1">${tagHtml}</div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

            document.getElementById('no-result').classList.toggle('hidden', visibleCount > 0);
            updateSelectedCount();
        }

        function toggleSelection(name) {
            if (selectedUniversities.has(name)) {
                selectedUniversities.delete(name);
            } else {
                selectedUniversities.add(name);
            }
            renderCheckboxes();
        }

        function clearSelection() {
            selectedUniversities.clear();
            renderCheckboxes();
        }

        function updateSelectedCount() {
            document.getElementById('selected-count').innerText = selectedUniversities.size;
            document.getElementById('next-btn').disabled = selectedUniversities.size === 0;
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => {
                    b.classList.remove('active', 'bg-slate-900', 'text-white');
                    b.classList.add('bg-slate-100', 'text-slate-600');
                });
                e.target.classList.add('active', 'bg-slate-900', 'text-white');
                e.target.classList.remove('bg-slate-100', 'text-slate-600');
                currentFilter = e.target.dataset.filter;
                renderCheckboxes();
            });
        });

        function goToSchedule() {
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            
            let earliestDate = "9999-99-99";
            selectedUniversities.forEach(name => {
                const uni = universitiesData.find(u => u.name === name);
                uni.schedules.forEach(s => {
                    if (s.date < earliestDate) earliestDate = s.date;
                });
            });
            
            if (earliestDate !== "9999-99-99") {
                calYear = parseInt(earliestDate.substring(0, 4));
                calMonth = parseInt(earliestDate.substring(5, 7)) - 1;
            }
            
            renderSchedulePage();
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
            window.scrollTo(0, 0);
        }

        function renderSchedulePage() {
            renderCalendars();
            renderDetails();
        }

        function changeMonth(delta) {
            calMonth += delta;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            if (calMonth < 0) { calMonth = 11; calYear--; }
            renderCalendars();
        }

        function renderCalendars() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('cal-title');
            title.innerText = `${calYear}년 ${calMonth + 1}월`;
            grid.innerHTML = '';

            const firstDayOfMonth = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

            for (let i = 0; i < firstDayOfMonth; i++) {
                grid.innerHTML += `<div class="cal-day p-1 border border-transparent"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${calYear}-${String(calMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let eventsHtml = '';
                
                universitiesData.forEach(uni => {
                    if (selectedUniversities.has(uni.name)) {
                        uni.schedules.forEach(s => {
                            if (s.date === dateStr) {
                                let timeDisplay = s.time.includes("미정") || s.time.includes("추후공지") ? "" : s.time.split(' ')[0];
                                let shortName = uni.name.replace('대학교', '').replace('(서울)', '').replace('(세종)', '').replace('(미래)', '').replace('(창의)', '').replace('(죽전)', '');
                                let typeClass = s.type === '수리' ? 'natural' : 'humanities';
                                eventsHtml += `
                                    <div class="event-tag ${typeClass}" title="${uni.name} ${s.time}">
                                        <div class="font-bold truncate">${shortName}</div>
                                        ${timeDisplay ? `<div class="opacity-90">${timeDisplay}</div>` : ''}
                                    </div>
                                `;
                            }
                        });
                    }
                });

                const dayOfWeek = new Date(calYear, calMonth, day).getDay();
                let dayClass = "cal-day p-1 text-xs text-slate-600 border border-slate-100 rounded-lg flex flex-col";
                if (dayOfWeek === 0) dayClass += " text-red-400";
                if (dayOfWeek === 6) dayClass += " text-blue-400";

                grid.innerHTML += `
                    <div class="${dayClass}">
                        <div class="font-semibold text-right pr-1 mb-1">${day}</div>
                        <div class="flex-1 overflow-hidden">${eventsHtml}</div>
                    </div>
                `;
            }
        }

        function renderDetails() {
            const container = document.getElementById('details-container');
            container.innerHTML = '';

            universitiesData.forEach(uni => {
                if (selectedUniversities.has(uni.name)) {
                    const card = document.createElement('div');
                    card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-slate-100';
                    
                    let scheduleHtml = uni.schedules.map(s => {
                        let typeColor = s.type === '수리' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700';
                        return `
                        <li class="mb-3 pb-3 border-b border-slate-50 last:border-0">
                            <div class="flex items-center gap-2 mb-1 flex-wrap">
                                <span class="bg-indigo-50 text-indigo-600 text-xs font-bold px-2 py-1 rounded">${s.date}</span>
                                <span class="text-slate-700 text-sm font-semibold">${s.time}</span>
                                <span class="text-[10px] font-bold px-2 py-1 rounded-full ${typeColor}">${s.type}</span>
                            </div>
                            <p class="text-xs text-slate-500 leading-relaxed pl-1">${s.detail}</p>
                        </li>
                    `}).join('');

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="flex items-center gap-2">
                                <div class="uni-letter w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg">${uni.letter}</div>
                                <h4 class="text-lg font-bold text-slate-800">${uni.name}</h4>
                            </div>
                            <div class="flex gap-1 flex-wrap justify-end">
                                ${uni.tags.map(t => `<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${t === '인문' ? 'bg-blue-50 text-blue-600' : 'bg-green-50 text-green-600'}">${t}</span>`).join('')}
                            </div>
                        </div>
                        <ul class="mb-4">${scheduleHtml}</ul>
                        <div class="bg-slate-50 p-4 rounded-xl text-xs space-y-3">
                            <h5 class="font-bold text-slate-700 border-b border-slate-200 pb-2">시험 상세 정보</h5>
                            <div class="grid grid-cols-1 gap-2">
                                <div class="flex gap-2">
                                    <span class="font-semibold text-slate-500 w-20 flex-shrink-0">수능 최저</span>
                                    <span class="text-slate-800 font-medium">${uni.info.minimum}</span>
                                </div>
                                <div class="flex gap-2">
                                    <span class="font-semibold text-slate-500 w-20 flex-shrink-0">필수 과목</span>
                                    <span class="text-slate-800 font-medium">${uni.info.mandatory}</span>
                                </div>
                                <div class="flex gap-2">
                                    <span class="font-semibold text-slate-500 w-20 flex-shrink-0">한국사</span>
                                    <span class="text-slate-800 font-medium">${uni.info.history}</span>
                                </div>
                                <div class="flex gap-2">
                                    <span class="font-semibold text-slate-500 w-20 flex-shrink-0">가산점</span>
                                    <span class="text-slate-800 font-medium">${uni.info.extra}</span>
                                </div>
                                <div class="flex gap-2 pt-2 border-t border-slate-200">
                                    <span class="font-semibold text-slate-500 w-20 flex-shrink-0">출제 경향</span>
                                    <span class="text-slate-600 leading-relaxed flex-1 break-keep">${uni.info.trend}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                }
            });
        }

        renderCheckboxes();
    </script>
</body>
</html>
